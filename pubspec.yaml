name: desktop_cat_app
description: A cute desktop cat that keeps the display awake.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  window_manager: ^0.4.3
  screen_retriever: ^0.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: false
  assets:
    - assets/characters/cat/
    - assets/characters/cat/sprites/
